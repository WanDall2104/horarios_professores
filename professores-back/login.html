<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Horários de Professores — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --card: #181818;
      --border: #2a2a2a;
      --accent: #c8a96e;
      --accent-dim: rgba(200,169,110,0.12);
      --text: #f0ece4;
      --muted: #7a7570;
      --error: #e07070;
      --success: #70b890;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow: hidden;
    }

    /* Background decorative lines */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        repeating-linear-gradient(90deg, rgba(200,169,110,0.03) 0px, rgba(200,169,110,0.03) 1px, transparent 1px, transparent 80px),
        repeating-linear-gradient(0deg, rgba(200,169,110,0.03) 0px, rgba(200,169,110,0.03) 1px, transparent 1px, transparent 80px);
      pointer-events: none;
    }

    .container {
      width: 100%;
      max-width: 420px;
      animation: fadeUp 0.6s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .header {
      text-align: center;
      margin-bottom: 40px;
    }

    .header .logo {
      font-family: 'DM Serif Display', serif;
      font-size: 13px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 12px;
    }

    .header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 36px;
      font-weight: 400;
      line-height: 1.15;
      color: var(--text);
    }

    .header h1 em {
      font-style: italic;
      color: var(--accent);
    }

    /* Tabs */
    .tabs {
      display: flex;
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 28px;
      background: var(--card);
    }

    .tab-btn {
      flex: 1;
      padding: 12px;
      background: transparent;
      border: none;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.25s;
      letter-spacing: 0.03em;
    }

    .tab-btn.active {
      background: var(--accent-dim);
      color: var(--accent);
    }

    /* Card */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 36px 32px;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0.6;
    }

    /* Panel */
    .panel { display: none; }
    .panel.active { display: block; animation: fadeIn 0.3s ease; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .panel h2 {
      font-family: 'DM Serif Display', serif;
      font-size: 22px;
      font-weight: 400;
      margin-bottom: 6px;
    }

    .panel p.subtitle {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 28px;
    }

    /* Fields */
    .field {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 12px 16px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus {
      border-color: var(--accent);
    }

    input::placeholder { color: var(--muted); }

    /* Button */
    .btn {
      width: 100%;
      padding: 14px;
      margin-top: 8px;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: #0f0f0f;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }

    .btn:hover { opacity: 0.88; }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Message */
    .msg {
      display: none;
      margin-top: 18px;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.5;
    }

    .msg.error {
      display: block;
      background: rgba(224,112,112,0.1);
      border: 1px solid rgba(224,112,112,0.3);
      color: var(--error);
    }

    .msg.success {
      display: block;
      background: rgba(112,184,144,0.1);
      border: 1px solid rgba(112,184,144,0.3);
      color: var(--success);
    }

    .footer-note {
      text-align: center;
      margin-top: 24px;
      font-size: 12px;
      color: var(--muted);
    }

    .footer-note span {
      color: var(--accent);
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 3px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">Sistema</div>
      <h1>Horários de<br/><em>Professores</em></h1>
    </div>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('login')">Entrar</button>
      <button class="tab-btn" onclick="switchTab('cadastro')">Cadastrar</button>
    </div>

    <div class="card">
      <!-- LOGIN -->
      <div class="panel active" id="panel-login">
        <h2>Bem-vindo de volta</h2>
        <p class="subtitle">Acesse sua conta para continuar.</p>

        <div class="field">
          <label>E-mail</label>
          <input type="email" id="login-email" placeholder="seu@email.com" />
        </div>
        <div class="field">
          <label>Senha</label>
          <input type="password" id="login-senha" placeholder="••••••••" />
        </div>

        <button class="btn" id="btn-login" onclick="fazerLogin()">Entrar</button>
        <div class="msg" id="msg-login"></div>
      </div>

      <!-- CADASTRO -->
      <div class="panel" id="panel-cadastro">
        <h2>Criar conta</h2>
        <p class="subtitle">Preencha os dados para se cadastrar.</p>

        <div class="field">
          <label>E-mail</label>
          <input type="email" id="cad-email" placeholder="seu@email.com" />
        </div>
        <div class="field">
          <label>Senha</label>
          <input type="password" id="cad-senha" placeholder="Mínimo 6 caracteres" />
        </div>
        <div class="field">
          <label>Confirmar senha</label>
          <input type="password" id="cad-confirma" placeholder="Repita a senha" />
        </div>

        <button class="btn" id="btn-cadastro" onclick="fazerCadastro()">Criar conta</button>
        <div class="msg" id="msg-cadastro"></div>
      </div>
    </div>

    <p class="footer-note" id="footer-note">
      Não tem conta? <span onclick="switchTab('cadastro')">Cadastre-se</span>
    </p>
  </div>

  <script>
    const API = 'http://localhost:3000';

    function switchTab(tab) {
      document.querySelectorAll('.tab-btn').forEach((b, i) => {
        b.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'cadastro'));
      });
      document.getElementById('panel-login').classList.toggle('active', tab === 'login');
      document.getElementById('panel-cadastro').classList.toggle('active', tab === 'cadastro');

      const note = document.getElementById('footer-note');
      if (tab === 'login') {
        note.innerHTML = `Não tem conta? <span onclick="switchTab('cadastro')">Cadastre-se</span>`;
      } else {
        note.innerHTML = `Já tem conta? <span onclick="switchTab('login')">Entrar</span>`;
      }

      limparMensagens();
    }

    function showMsg(id, tipo, texto) {
      const el = document.getElementById(id);
      el.className = 'msg ' + tipo;
      el.textContent = texto;
    }

    function limparMensagens() {
      ['msg-login', 'msg-cadastro'].forEach(id => {
        const el = document.getElementById(id);
        el.className = 'msg';
        el.textContent = '';
      });
    }

    async function fazerLogin() {
      const email = document.getElementById('login-email').value.trim();
      const senha = document.getElementById('login-senha').value;
      const btn = document.getElementById('btn-login');

      if (!email || !senha) {
        showMsg('msg-login', 'error', 'Preencha e-mail e senha.');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Entrando...';

      try {
        const res = await fetch(`${API}/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, senha }),
        });

        const data = await res.json();

        if (!res.ok) {
          showMsg('msg-login', 'error', data.error || 'Erro ao fazer login.');
        } else {
          localStorage.setItem('token', data.token);
          showMsg('msg-login', 'success', '✓ Login realizado com sucesso! Token salvo.');
        }
      } catch (e) {
        showMsg('msg-login', 'error', 'Não foi possível conectar à API. Verifique se o servidor está rodando.');
      }

      btn.disabled = false;
      btn.textContent = 'Entrar';
    }

    async function fazerCadastro() {
      const email = document.getElementById('cad-email').value.trim();
      const senha = document.getElementById('cad-senha').value;
      const confirma = document.getElementById('cad-confirma').value;
      const btn = document.getElementById('btn-cadastro');

      if (!email || !senha || !confirma) {
        showMsg('msg-cadastro', 'error', 'Preencha todos os campos.');
        return;
      }

      if (senha.length < 6) {
        showMsg('msg-cadastro', 'error', 'A senha deve ter no mínimo 6 caracteres.');
        return;
      }

      if (senha !== confirma) {
        showMsg('msg-cadastro', 'error', 'As senhas não coincidem.');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Cadastrando...';

      try {
        const res = await fetch(`${API}/usuarios`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, senha }),
        });

        const data = await res.json();

        if (!res.ok) {
          showMsg('msg-cadastro', 'error', data.error || 'Erro ao cadastrar.');
        } else {
          showMsg('msg-cadastro', 'success', '✓ Conta criada com sucesso! Agora faça o login.');
          setTimeout(() => switchTab('login'), 2000);
        }
      } catch (e) {
        showMsg('msg-cadastro', 'error', 'Não foi possível conectar à API. Verifique se o servidor está rodando.');
      }

      btn.disabled = false;
      btn.textContent = 'Criar conta';
    }

    // Enter key support
    document.addEventListener('keydown', (e) => {
      if (e.key !== 'Enter') return;
      if (document.getElementById('panel-login').classList.contains('active')) fazerLogin();
      else fazerCadastro();
    });
  </script>
</body>
</html>

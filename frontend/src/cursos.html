<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cursos — Sistema de Horários</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <link rel="stylesheet" href="./css/style.css">
  <link rel="stylesheet" href="./css/dashboard.css">
  <link rel="stylesheet" href="./css/cursos.css">
</head>
<body>

<div class="layout">

  <aside class="sidebar">
    <div class="sidebar-header">
      <img src="./assets/unisenaidash.png" alt="Logo UniSENAI" class="sidebar-logo">
    </div>

    <nav class="sidebar-nav">
      <a href="dashboard.html" class="nav-link" data-icon="dashboard">
        <i class="nav-icon fas fa-chart-line"></i>
        <span>Dashboard</span>
      </a>
      <a href="professores.html" class="nav-link" data-icon="professores">
        <i class="nav-icon fas fa-chalkboard-user"></i>
        <span>Professores</span>
      </a>
      <a href="cursos.html" class="nav-link active" data-icon="cursos">
        <i class="nav-icon fas fa-book"></i>
        <span>Cursos</span>
      </a>
      <a href="disciplinas.html" class="nav-link" data-icon="disciplinas">
        <i class="nav-icon fas fa-graduation-cap"></i>
        <span>Disciplinas</span>
      </a>
      <a href="aulas.html" class="nav-link" data-icon="aulas">
        <i class="nav-icon fas fa-calendar"></i>
        <span>Aulas</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <button class="btn-logout" onclick="logout()">Sair do Sistema</button>
    </div>
  </aside>

  <main class="content">

    <header class="topbar">
      <div class="topbar-left">
        <h1>Gestão de Cursos</h1>
        <p class="topbar-subtitle">Gerencie os cursos do sistema</p>
      </div>
      <div class="topbar-right">
        <button class="user-btn">
          <i data-lucide="user-round"></i>
          <span id="user-name">Usuário</span>
        </button>
      </div>
    </header>

    <section class="page-content">

      <div class="content-header">
        <h2>Novo Curso</h2>
        <p>Preencha os dados abaixo para cadastrar um novo curso</p>
      </div>

      <div class="form-card">
        <form class="curso-form" id="curso-form">
          <div class="form-row">
            <div class="form-group">
              <label for="nome-curso">Nome do Curso</label>
              <input type="text" id="nome-curso" placeholder="Ex: Técnico em Informática" required>
            </div>
            <div class="form-group">
              <label for="carga-horaria">Carga Horária (horas)</label>
              <input type="number" id="carga-horaria" placeholder="Ex: 1200" min="1">
            </div>
          </div>

          <div class="form-group">
            <label for="descricao-curso">Descrição</label>
            <textarea id="descricao-curso" rows="3" placeholder="Descreva o objetivo e conteúdo do curso..."></textarea>
          </div>

          <div class="form-actions">
            <button type="button" class="btn btn-primary" onclick="salvarCurso()">Cadastrar Curso</button>
            <button type="reset" class="btn btn-secondary">Limpar Campos</button>
          </div>
        </form>
      </div>

      <!-- MENSAGEM DE FEEDBACK -->
      <div id="msg-feedback" class="msg-feedback" style="display:none;"></div>

      <div class="table-section">
        <div class="table-header">
          <h2>Lista de Cursos</h2>
          <div class="table-info">
            <span id="total-cursos-table" class="badge">0</span>
          </div>
        </div>

        <div class="table-container">
          <table class="data-table">
            <thead>
              <tr>
                <th>ID</th>
                <th>Nome do Curso</th>
                <th>Descrição</th>
                <th>Carga Horária</th>
                <th>Ações</th>
              </tr>
            </thead>
            <tbody id="tabela-cursos"></tbody>
          </table>
          <div class="empty-state" id="empty-state">
            <p>Nenhum curso cadastrado ainda</p>
          </div>
        </div>
      </div>

    </section>

  </main>

</div>

<!-- MODAL DE EDIÇÃO -->
<div class="modal" id="modal-edicao">
  <div class="modal-content">
    <div class="modal-header">
      <h2>Editar Curso</h2>
      <button class="btn-close" onclick="fecharModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="curso-form">
        <input type="hidden" id="edit-id">
        <div class="form-row">
          <div class="form-group">
            <label for="edit-nome">Nome do Curso</label>
            <input type="text" id="edit-nome" placeholder="Ex: Técnico em Informática" required>
          </div>
          <div class="form-group">
            <label for="edit-carga">Carga Horária (horas)</label>
            <input type="number" id="edit-carga" placeholder="Ex: 1200" min="1">
          </div>
        </div>
        <div class="form-group">
          <label for="edit-descricao">Descrição</label>
          <textarea id="edit-descricao" rows="3" placeholder="Descreva o objetivo e conteúdo do curso..."></textarea>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="fecharModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="salvarEdicao()">Salvar Alterações</button>
    </div>
  </div>
</div>

<script src="./js/storage.js"></script>
<script src="./js/cursos.js"></script>
</body>
</html>

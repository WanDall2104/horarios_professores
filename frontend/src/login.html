<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Horários de Professores — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="./css/style.css"/>
  <script src="./js/auth.js" defer></script>
</head>
<body>
  <div class="container">
    <div class="header">
      <img src="./assets/logounisenai.png" alt="Logo do Sistema de Horários de Professores" class="logo"/> 
      <h1>Sistema de Horários de Professores</h1>
      <p>Acesse com suas credenciais institucionais</p>
    </div>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('login')">Entrar</button>
    </div>

    <div class="card">
      <!-- LOGIN -->
      <div class="panel active" id="panel-login">
        <div class="panel-title">Acesso ao Sistema</div>
        <div class="panel-sub">Informe seu e-mail e senha para continuar.</div>
        <div class="divider"></div>

        <div class="field">
          <label>E-mail</label>
          <input type="email" id="login-email" placeholder="seu@email.com" />
        </div>
        <div class="field">
          <label>Senha</label>
          <input type="password" id="login-senha" placeholder="••••••••" />
        </div>

        <button class="btn" id="btn-login" onclick="fazerLogin()">Entrar no Sistema</button>
        <div class="msg" id="msg-login"></div>
      </div>

    <p class="footer-brand">UniSENAI PR &mdash; São José dos Pinhais</p>
  </div>

</body>
</html>

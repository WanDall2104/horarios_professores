<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Sistema de Horários</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <link rel="stylesheet" href="./css/style.css">
  <link rel="stylesheet" href="./css/dashboard.css">
</head>
<body>

<div class="layout">

  <aside class="sidebar">
    <div class="sidebar-header">
      <img src="./assets/unisenaidash.png" alt="Logo UniSENAI" class="sidebar-logo">
    </div>

    <nav class="sidebar-nav">
      <a href="dashboard.html" class="nav-link active" data-icon="dashboard">
        <i class="nav-icon fas fa-chart-line"></i>
        <span>Dashboard</span>
      </a>
      <a href="professores.html" class="nav-link" data-icon="professores">
        <i class="nav-icon fas fa-chalkboard-user"></i>
        <span>Professores</span>
      </a>
      <a href="cursos.html" class="nav-link" data-icon="cursos">
        <i class="nav-icon fas fa-book"></i>
        <span>Cursos</span>
      </a>
      <a href="disciplinas.html" class="nav-link" data-icon="disciplinas">
        <i class="nav-icon fas fa-graduation-cap"></i>
        <span>Disciplinas</span>
      </a>
      <a href="aulas.html" class="nav-link" data-icon="aulas">
        <i class="nav-icon fas fa-calendar"></i>
        <span>Aulas</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <button class="btn-logout" onclick="logout()">Sair do Sistema</button>
    </div>
  </aside>

  <main class="content">

    <header class="topbar">
      <div class="topbar-left">
        <h1>Sistema de Horários de Professores</h1>
        <p class="topbar-subtitle">Bem-vindo ao painel de controle</p>
      </div>
      <div class="topbar-right">
        <span class="user-info" id="user-name">Usuário</span>
      </div>
    </header>

    <section class="dashboard-content">
      
      <div class="stats-grid">
        <div class="stat-card" data-stat="professores">
          <i class="stat-icon fas fa-chalkboard-user"></i>
          <div class="stat-info">
            <h3>Professores</h3>
            <p class="stat-value" id="total-professores">0</p>
          </div>
        </div>

        <div class="stat-card" data-stat="cursos">
          <i class="stat-icon fas fa-book"></i>
          <div class="stat-info">
            <h3>Cursos</h3>
            <p class="stat-value" id="total-cursos">0</p>
          </div>
        </div>

        <div class="stat-card" data-stat="aulas">
          <i class="stat-icon fas fa-calendar"></i>
          <div class="stat-info">
            <h3>Aulas</h3>
            <p class="stat-value" id="total-aulas">0</p>
          </div>
        </div>

        <div class="stat-card" data-stat="disciplinas">
          <i class="stat-icon fas fa-graduation-cap"></i>
          <div class="stat-info">
            <h3>Disciplinas</h3>
            <p class="stat-value" id="total-disciplinas">0</p>
          </div>
        </div>
      </div>

      <div class="quick-actions">
        <h2>Ações Rápidas</h2>
        <div class="actions-grid">
          <a href="professores.html" class="action-btn" data-action="novo-professor">
            <i class="action-icon fas fa-user-plus"></i>
            <span>Novo Professor</span>
          </a>
          <a href="cursos.html" class="action-btn" data-action="novo-curso">
            <i class="action-icon fas fa-book-open"></i>
            <span>Novo Curso</span>
          </a>
          <a href="aulas.html" class="action-btn" data-action="nova-aula">
            <i class="action-icon fas fa-calendar-plus"></i>
            <span>Nova Aula</span>
          </a>
          <a href="disciplinas.html" class="action-btn" data-action="nova-disciplina">
            <i class="action-icon fas fa-plus-circle"></i>
            <span>Nova Disciplina</span>
          </a>
        </div>
      </div>

    </section>

  </main>

</div>

<script src="./js/dashboard.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Horários de Professores — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #1a3a6b;
      --blue: #0077c8;
      --cyan: #00aeef;
      --white: #ffffff;
      --light: #f4f7fb;
      --border: #d0dce8;
      --text: #1a2e44;
      --muted: #6b8099;
      --error: #c0392b;
      --success: #1a7a4a;
    }

    body {
      background: var(--light);
      color: var(--text);
      font-family: 'Open Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 5px;
      background: linear-gradient(90deg, var(--navy), var(--blue), var(--cyan));
      z-index: 100;
    }

    .container {
      width: 100%;
      max-width: 440px;
      animation: fadeUp 0.5s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .header {
      text-align: center;
      margin-bottom: 28px;
    }

    .header img {
      height: 52px;
      margin-bottom: 20px;
    }

    .header h1 {
      font-size: 18px;
      font-weight: 600;
      color: var(--navy);
      line-height: 1.4;
    }

    .header p {
      font-size: 13px;
      color: var(--muted);
      margin-top: 4px;
    }

    /* Tabs */
    .tabs {
      display: flex;
      border-radius: 8px 8px 0 0;
      overflow: hidden;
      border: 1px solid var(--border);
      border-bottom: none;
    }

    .tab-btn {
      flex: 1;
      padding: 13px;
      background: #e8eef5;
      border: none;
      color: var(--muted);
      font-family: 'Open Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .tab-btn.active {
      background: var(--white);
      color: var(--blue);
      border-bottom: 3px solid var(--blue);
    }

    .tab-btn:hover:not(.active) {
      background: #dde5ef;
      color: var(--navy);
    }

    /* Card */
    .card {
      background: var(--white);
      border: 1px solid var(--border);
      border-top: none;
      border-radius: 0 0 8px 8px;
      padding: 32px 36px 36px;
      box-shadow: 0 4px 20px rgba(0,80,160,0.08);
    }

    /* Panel */
    .panel { display: none; }
    .panel.active { display: block; animation: fadeIn 0.25s ease; }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    .panel-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--navy);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .panel-sub {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 24px;
    }

    /* Divider */
    .divider {
      height: 1px;
      background: var(--border);
      margin-bottom: 24px;
    }

    /* Fields */
    .field {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--navy);
      margin-bottom: 6px;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 11px 14px;
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: 5px;
      color: var(--text);
      font-family: 'Open Sans', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(0,119,200,0.12);
    }

    input::placeholder { color: #b0bec8; }

    /* Button */
    .btn {
      width: 100%;
      padding: 13px;
      margin-top: 8px;
      background: var(--blue);
      border: none;
      border-radius: 5px;
      color: var(--white);
      font-family: 'Open Sans', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    .btn:hover { background: var(--navy); }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Message */
    .msg {
      display: none;
      margin-top: 16px;
      padding: 11px 14px;
      border-radius: 5px;
      font-size: 13px;
      line-height: 1.5;
      font-weight: 600;
    }

    .msg.error {
      display: block;
      background: #fdf0ee;
      border-left: 4px solid var(--error);
      color: var(--error);
    }

    .msg.success {
      display: block;
      background: #edf7f1;
      border-left: 4px solid var(--success);
      color: var(--success);
    }

    .footer-note {
      text-align: center;
      margin-top: 20px;
      font-size: 12px;
      color: var(--muted);
    }

    .footer-note span {
      color: var(--blue);
      cursor: pointer;
      font-weight: 600;
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .footer-brand {
      text-align: center;
      margin-top: 28px;
      font-size: 11px;
      color: #a0b0c0;
    }
  </style>
</head>

      <h1>Sistema de Horários de Professores</h1>
      <p>Acesse com suas credenciais institucionais</p>
    </div>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('login')">Entrar</button>
      <button class="tab-btn" onclick="switchTab('cadastro')">Cadastrar</button>
    </div>

    <div class="card">
      <!-- LOGIN -->
      <div class="panel active" id="panel-login">
        <div class="panel-title">Acesso ao Sistema</div>
        <div class="panel-sub">Informe seu e-mail e senha para continuar.</div>
        <div class="divider"></div>

        <div class="field">
          <label>E-mail</label>
          <input type="email" id="login-email" placeholder="seu@email.com" />
        </div>
        <div class="field">
          <label>Senha</label>
          <input type="password" id="login-senha" placeholder="••••••••" />
        </div>

        <button class="btn" id="btn-login" onclick="fazerLogin()">Entrar no Sistema</button>
        <div class="msg" id="msg-login"></div>
      </div>

      <!-- CADASTRO -->
      <div class="panel" id="panel-cadastro">
        <div class="panel-title">Criar Conta</div>
        <div class="panel-sub">Preencha os dados abaixo para se cadastrar.</div>
        <div class="divider"></div>

        <div class="field">
          <label>E-mail</label>
          <input type="email" id="cad-email" placeholder="seu@email.com" />
        </div>
        <div class="field">
          <label>Senha</label>
          <input type="password" id="cad-senha" placeholder="Mínimo 6 caracteres" />
        </div>
        <div class="field">
          <label>Confirmar Senha</label>
          <input type="password" id="cad-confirma" placeholder="Repita a senha" />
        </div>

        <button class="btn" id="btn-cadastro" onclick="fazerCadastro()">Criar Conta</button>
        <div class="msg" id="msg-cadastro"></div>
      </div>
    </div>

    <p class="footer-note" id="footer-note">
      Não tem conta? <span onclick="switchTab('cadastro')">Cadastre-se</span>
    </p>
    <p class="footer-brand">UniSENAI PR &mdash; São José dos Pinhais</p>
  </div>

  <script>
    const API = 'http://localhost:3000';

    function switchTab(tab) {
      document.querySelectorAll('.tab-btn').forEach((b, i) => {
        b.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'cadastro'));
      });
      document.getElementById('panel-login').classList.toggle('active', tab === 'login');
      document.getElementById('panel-cadastro').classList.toggle('active', tab === 'cadastro');

      const note = document.getElementById('footer-note');
      if (tab === 'login') {
        note.innerHTML = 'Não tem conta? <span onclick="switchTab(\'cadastro\')">Cadastre-se</span>';
      } else {
        note.innerHTML = 'Já tem conta? <span onclick="switchTab(\'login\')">Entrar</span>';
      }
      limparMensagens();
    }

    function showMsg(id, tipo, texto) {
      const el = document.getElementById(id);
      el.className = 'msg ' + tipo;
      el.textContent = texto;
    }

    function limparMensagens() {
      ['msg-login', 'msg-cadastro'].forEach(id => {
        const el = document.getElementById(id);
        el.className = 'msg';
        el.textContent = '';
      });
    }

    async function fazerLogin() {
      const email = document.getElementById('login-email').value.trim();
      const senha = document.getElementById('login-senha').value;
      const btn = document.getElementById('btn-login');
      if (!email || !senha) { showMsg('msg-login', 'error', 'Preencha e-mail e senha.'); return; }
      btn.disabled = true; btn.textContent = 'Entrando...';
      try {
        const res = await fetch(API + '/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, senha }),
        });
        const data = await res.json();
        if (!res.ok) { showMsg('msg-login', 'error', data.error || 'Erro ao fazer login.'); }
        else { localStorage.setItem('token', data.token); showMsg('msg-login', 'success', '✓ Login realizado com sucesso!'); }
      } catch (e) {
        showMsg('msg-login', 'error', 'Não foi possível conectar à API. Verifique se o servidor está rodando.');
      }
      btn.disabled = false; btn.textContent = 'Entrar no Sistema';
    }

    async function fazerCadastro() {
      const email = document.getElementById('cad-email').value.trim();
      const senha = document.getElementById('cad-senha').value;
      const confirma = document.getElementById('cad-confirma').value;
      const btn = document.getElementById('btn-cadastro');
      if (!email || !senha || !confirma) { showMsg('msg-cadastro', 'error', 'Preencha todos os campos.'); return; }
      if (senha.length < 6) { showMsg('msg-cadastro', 'error', 'A senha deve ter no mínimo 6 caracteres.'); return; }
      if (senha !== confirma) { showMsg('msg-cadastro', 'error', 'As senhas não coincidem.'); return; }
      btn.disabled = true; btn.textContent = 'Cadastrando...';
      try {
        const res = await fetch(API + '/usuarios', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, senha }),
        });
        const data = await res.json();
        if (!res.ok) { showMsg('msg-cadastro', 'error', data.error || 'Erro ao cadastrar.'); }
        else { showMsg('msg-cadastro', 'success', '✓ Conta criada com sucesso! Redirecionando...'); setTimeout(() => switchTab('login'), 2000); }
      } catch (e) {
        showMsg('msg-cadastro', 'error', 'Não foi possível conectar à API. Verifique se o servidor está rodando.');
      }
      btn.disabled = false; btn.textContent = 'Criar Conta';
    }

    document.addEventListener('keydown', (e) => {
      if (e.key !== 'Enter') return;
      if (document.getElementById('panel-login').classList.contains('active')) fazerLogin();
      else fazerCadastro();
    });
  </script>
</body>
</html>
